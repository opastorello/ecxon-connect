name: VirusTotal scan

# Roda em paralelo ao Release. Ao publicar uma release, baixa o .msi anexo,
# submete ao VirusTotal e atualiza o body do release com o link do relatório.
# Desacoplado do release.yml: falha do VT não bloqueia a publicação.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag do release (ex: v1.0.0)'
        required: true

jobs:
  scan:
    name: Submit to VirusTotal
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: ${{ github.event.release.assets[0] != null || github.event.inputs.tag != '' }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download release asset
        shell: bash
        run: |
          mkdir -p out
          curl -sSL -o out/ecxon-connect.msi \
            "https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/ecxon-connect.msi"
          ls -lh out/

      - name: Submit to VirusTotal
        if: ${{ env.VT_API_KEY != '' }}
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          update_release_body: true
          request_rate: 4
          files: |
            out/ecxon-connect.msi
