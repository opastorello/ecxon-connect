name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release-windows:
    name: Build & release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install npm deps
        run: npm install

      - name: Build Tauri (msi only)
        run: npm run tauri build -- --target x86_64-pc-windows-msvc

      - name: Rename MSI to stable name
        id: collect
        shell: pwsh
        run: |
          $base = "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi"
          $msi = Get-ChildItem -Path $base -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { throw "MSI não encontrado em $base" }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Copy-Item $msi.FullName "artifacts/ecxon-connect.msi"
          Get-ChildItem artifacts | Format-Table
          # Hash pra release notes
          $hash = (Get-FileHash artifacts/ecxon-connect.msi -Algorithm SHA256).Hash.ToLower()
          "sha256=$hash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ecxon Connect ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            **SHA256:** `${{ steps.collect.outputs.sha256 }}`

            **Download:** [`ecxon-connect.msi`](https://github.com/${{ github.repository }}/releases/latest/download/ecxon-connect.msi)
          append_body: true
          files: |
            artifacts/ecxon-connect.msi

      - name: Submit to VirusTotal
        if: ${{ env.VT_API_KEY != '' }}
        env:
          VT_API_KEY: ${{ secrets.VT_API_KEY }}
        uses: crazy-max/ghaction-virustotal@v4
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          update_release_body: true
          request_rate: 4
          files: |
            artifacts/ecxon-connect.msi
